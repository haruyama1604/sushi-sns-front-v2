<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="25%"  stop-color="#ffd93d"/>
      <stop offset="50%"  stop-color="#6bcb77"/>
      <stop offset="75%"  stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="50%"  stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
  </defs>
  <!-- 背景円 -->
  <circle cx="32" cy="32" r="30" fill="#0a0a12"/>
  <!-- 皿（楕円） -->
  <ellipse cx="32" cy="46" rx="22" ry="6" fill="url(#plate)" opacity="0.95"/>
  <!-- シャリ -->
  <ellipse cx="32" cy="36" rx="13" ry="8" fill="#f5f0e8"/>
  <!-- ネタ（グラデーション） -->
  <ellipse cx="32" cy="30" rx="12" ry="5.5" fill="url(#rainbow)" opacity="0.9"/>
  <!-- 光沢 -->
  <ellipse cx="27" cy="28" rx="3.5" ry="1.5" fill="white" opacity="0.35"/>
</svg>
